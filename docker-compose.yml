version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instaclone
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/instaclone
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      PORT: 8080
      NODE_ENV: production
    ports:
      - "8080:8080"

volumes:
  db_data:
