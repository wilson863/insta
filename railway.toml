[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/insta-app run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
