[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c '(pnpm --filter @workspace/db run push || echo \"Warning: DB migration failed - set DATABASE_URL in Railway\") && node artifacts/api-server/dist/index.mjs'"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
